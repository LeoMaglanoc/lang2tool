<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Language Trial Viewer - thesis_main_v3_v3</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f8f7f4;
      --panel: #ffffff;
      --text: #202124;
      --muted: #5f6368;
      --line: #d7d2c8;
      --accent: #2a7f76;
      --bad: #b3261e;
      --bad-bg: #fce8e6;
      --good: #137333;
      --good-bg: #e6f4ea;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.45;
    }
    header {
      padding: 28px 32px 18px;
      border-bottom: 1px solid var(--line);
      background: #fffaf0;
    }
    h1 { margin: 0 0 6px; font-size: 28px; font-weight: 700; }
    h2 { margin: 0 0 12px; font-size: 18px; }
    h3 { margin: 0; font-size: 15px; }
    .subtle { color: var(--muted); margin: 0; }
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      padding: 18px 32px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }
    .card .label { color: var(--muted); font-size: 12px; text-transform: uppercase; }
    .card .value { font-size: 24px; font-weight: 700; margin-top: 3px; }
    .controls {
      display: grid;
      grid-template-columns: minmax(220px, 2fr) minmax(160px, 1fr) minmax(160px, 1fr);
      gap: 12px;
      padding: 0 32px 18px;
    }
    input, select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      background: white;
      color: var(--text);
      font: inherit;
    }
    main {
      display: grid;
      grid-template-columns: minmax(330px, 42%) minmax(360px, 1fr);
      gap: 18px;
      padding: 0 32px 32px;
    }
    .list, .detail {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 500px;
      overflow: hidden;
    }
    .list-header, .detail-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #fbfaf8;
    }
    .trial-list { max-height: 72vh; overflow: auto; }
    .trial {
      width: 100%;
      text-align: left;
      display: block;
      border: 0;
      border-bottom: 1px solid var(--line);
      background: white;
      padding: 12px 14px;
      cursor: pointer;
    }
    .trial:hover, .trial.active { background: #eef7f6; }
    .trial-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-weight: 700;
      font-size: 14px;
    }
    .trial-meta { color: var(--muted); font-size: 12px; margin-top: 4px; }
    .prompt { margin-top: 7px; font-size: 13px; }
    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .pass { background: var(--good-bg); color: var(--good); }
    .fail { background: var(--bad-bg); color: var(--bad); }
    .detail-body { padding: 16px; }
    .comparison {
      display: grid;
      grid-template-columns: 150px 1fr 1fr;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .comparison div { padding: 9px 10px; border-bottom: 1px solid var(--line); }
    .comparison div:nth-child(3n+1) { background: #fbfaf8; font-weight: 700; }
    .comparison div:nth-last-child(-n+3) { border-bottom: 0; }
    .mismatch { background: var(--bad-bg); color: var(--bad); font-weight: 700; }
    .section { margin-top: 18px; }
    pre {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      margin: 0;
      background: #f6f5f2;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
    }
    @media (max-width: 900px) {
      .controls, main { grid-template-columns: 1fr; padding-left: 18px; padding-right: 18px; }
      .summary, header { padding-left: 18px; padding-right: 18px; }
      .trial-list { max-height: 45vh; }
      .comparison { grid-template-columns: 112px 1fr 1fr; }
    }
  </style>
</head>

        return query === "" || trialSearchText(trial).includes(query);
